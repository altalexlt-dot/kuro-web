<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuro 黑 — La Carta</title>
  <meta name="theme-color" content="#0A0A0A"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=Syne:wght@200;300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --black: #050505; --bg: #0A0A0A; --bg-raised: #111111;
      --surface: #131313; --surface-hi: #1a1a1a;
      --border: rgba(255,255,255,0.08); --border-hi: rgba(255,255,255,0.15);
      --ash: #9A9A9A; --ash-dim: #464646; --cream: #EDE9E2; --red: #C1121F;
      --f-display: 'Cinzel', serif; --f-serif: 'Cormorant Garamond', serif; --f-sans: 'Syne', sans-serif;
      --ease-expo: cubic-bezier(0.16,1,0.3,1); --pad-x: clamp(1.5rem,5vw,5rem); --max-w: 1000px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { background: var(--bg); color: var(--cream); font-family: var(--f-sans); font-weight: 300; overflow-x: hidden; cursor: none; -webkit-font-smoothing: antialiased; padding-bottom: 6rem; }
    a, button { color: inherit; text-decoration: none; border: none; background: none; font: inherit; }
    ul { list-style: none; }
    ::selection { background: var(--red); color: #fff; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--ash-dim); }
    body::after { content: ''; position: fixed; inset: -50%; width: 200%; height: 200%; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E"); opacity: 0.025; pointer-events: none; z-index: 9000; }
    #cur-dot, #cur-ring { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; top: 0; left: 0; }
    #cur-dot { width: 6px; height: 6px; background: var(--red); transform: translate(-50%,-50%); }
    #cur-ring { width: 40px; height: 40px; border: 1px solid rgba(193,18,31,0.45); transform: translate(-50%,-50%); transition: width .4s var(--ease-expo), height .4s var(--ease-expo); }
    #cur-ring.is-hover { width: 64px; height: 64px; border-color: rgba(193,18,31,0.8); }
    .nav { position: absolute; top: 0; left: 0; width: 100%; z-index: 500; padding: 2rem var(--pad-x); display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, rgba(10,10,10,0.9) 0%, transparent 100%); }
    .nav__logo { font-family: var(--f-display); font-size: 0.85rem; letter-spacing: 0.35em; text-transform: uppercase; }
    .nav__logo span { color: var(--red); }
    .nav__back { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ash); transition: color 0.3s; cursor: none; display: flex; align-items: center; gap: 0.5rem; }
    .nav__back:hover { color: var(--cream); }
    .header { padding: 10rem var(--pad-x) 4rem; text-align: center; border-bottom: 1px solid var(--border); }
    .header__tag { font-size: 0.55rem; letter-spacing: 0.45em; color: var(--red); text-transform: uppercase; margin-bottom: 1.5rem; }
    .header__title { font-family: var(--f-display); font-size: clamp(3rem, 6vw, 5rem); font-weight: 300; line-height: 1; letter-spacing: -0.02em; }
    .header__title em { font-style: italic; color: var(--ash); }
    .menu-bar { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .menu-bar-left { display: flex; align-items: center; flex: 1; overflow: hidden; }
    .filter-open-btn { display: flex; align-items: center; gap: 0.6rem; padding: 0 var(--pad-x); height: 70px; border-right: 1px solid var(--border); color: var(--ash); font-family: var(--f-sans); font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: none; transition: color 0.3s; flex-shrink: 0; }
    .filter-open-btn:hover { color: var(--cream); }
    .filter-open-btn svg { width: 16px; height: 16px; }
    .filter-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; display: none; }
    .filter-dot.active { display: block; }
    .cat-nav { display: flex; gap: 2rem; overflow-x: auto; scrollbar-width: none; padding: 0 var(--pad-x); height: 70px; align-items: center; }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-nav a { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ash-dim); white-space: nowrap; transition: color 0.3s; cursor: none; }
    .cat-nav a:hover, .cat-nav a.active { color: var(--cream); }
    .lang-switcher { display: flex; gap: 1rem; align-items: center; padding: 0 var(--pad-x); height: 70px; border-left: 1px solid var(--border); flex-shrink: 0; }
    .lang-btn { font-family: var(--f-display); font-size: 0.8rem; color: var(--ash-dim); cursor: none; transition: color 0.3s; }
    .lang-btn.active, .lang-btn:hover { color: var(--cream); }
    .filter-drawer { position: fixed; top: 0; left: 0; width: 100%; max-width: 400px; height: 100svh; background: var(--surface); border-right: 1px solid var(--red); z-index: 1001; transform: translateX(-100%); transition: transform 0.6s var(--ease-expo); display: flex; flex-direction: column; }
    .filter-drawer.active { transform: translateX(0); }
    .filter-hd { padding: 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .filter-hd h2 { font-family: var(--f-display); font-size: 1.5rem; }
    .filter-desc { padding: 1.5rem 2rem 0; font-family: var(--f-serif); font-style: italic; color: var(--ash); font-size: 1rem; line-height: 1.5; }
    .filter-list { flex: 1; overflow-y: auto; padding: 1.5rem 2rem 2rem; display: flex; flex-direction: column; gap: 0.8rem; }
    .f-btn { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.2rem; border: 1px solid var(--border-hi); border-radius: 6px; background: transparent; color: var(--ash); font-family: var(--f-sans); font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: none; transition: all 0.3s; }
    .f-btn:hover { border-color: var(--cream); color: var(--cream); }
    .f-btn.active { border-color: var(--red); color: var(--red); background: rgba(193,18,31,0.05); }
    .hidden { display: none !important; }

    /* Loading state */
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8rem 2rem; gap: 2rem; }
    .loading-state p { font-family: var(--f-serif); font-style: italic; color: var(--ash); }
    .loading-bar { width: 200px; height: 1px; background: var(--border); position: relative; overflow: hidden; }
    .loading-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--red); animation: loadingSlide 1.2s ease-in-out infinite; }
    @keyframes loadingSlide { to { left: 100%; } }

    .menu-container { max-width: var(--max-w); margin: 0 auto; padding: 4rem var(--pad-x); }
    .category-section { margin-bottom: 6rem; scroll-margin-top: 100px; }
    .category-title { font-family: var(--f-display); font-size: 2rem; font-weight: 300; color: var(--cream); margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-hi); }
    .dish { border-bottom: 1px solid var(--border); transition: background 0.4s; }
    .dish.is-expanded { background: var(--bg-raised); border-color: var(--border-hi); }
    .dish__header { display: flex; justify-content: space-between; align-items: center; padding: 1.8rem 1rem; cursor: none; gap: 2rem; transition: padding-left 0.4s var(--ease-expo); }
    .dish:hover .dish__header { padding-left: 1.5rem; }
    .dish__info { flex: 1; }
    .dish__name { font-family: var(--f-display); font-size: 1.3rem; margin-bottom: 0.4rem; transition: color 0.3s; }
    .dish:hover .dish__name { color: var(--red); }
    .dish__desc { font-family: var(--f-serif); font-style: italic; font-size: 0.95rem; color: var(--ash); line-height: 1.5; max-width: 500px; }
    .dish__actions { display: flex; align-items: center; gap: 1.5rem; }
    .dish__price { font-family: var(--f-display); font-size: 1.1rem; color: var(--ash); }
    .dish__add { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-hi); color: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: none; transition: all 0.3s; }
    .dish__add:hover { background: var(--red); border-color: var(--red); }
    .dish__add.in-cart { background: var(--red); border-color: var(--red); }
    .dish__content-wrapper { height: 0; overflow: hidden; }
    .dish__expanded { padding: 0 1rem 2rem; display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 3rem; }
    .dish__img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; border: 1px solid var(--border); }
    .dish__img-wrap img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85) contrast(1.1); transition: transform 0.6s; }
    .dish.is-expanded .dish__img-wrap img { transform: scale(1.05); }
    .dish__specs { padding-top: 0.5rem; }
    .d-section { margin-bottom: 2rem; }
    .d-section__title { font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--red); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
    .ing-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }
    .ing-item { display: flex; justify-content: space-between; font-family: var(--f-serif); font-size: 0.95rem; color: var(--cream); border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 0.2rem; }
    .ing-item span:last-child { color: var(--ash); font-style: italic; }
    .ing-sauce { color: var(--red) !important; }
    .macros-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
    .macro-box { background: var(--bg); border: 1px solid var(--border); padding: 0.8rem 0.2rem; text-align: center; }
    .macro-val { font-family: var(--f-display); font-size: 1.1rem; color: var(--cream); margin-bottom: 0.2rem; }
    .macro-val .unit { font-size: 0.8em; color: var(--ash); }
    .macro-lbl { font-size: 0.4rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ash-dim); }
    .allergens-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .allergen-tag { font-size: 0.45rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.3rem 0.6rem; border: 1px solid var(--border-hi); color: var(--ash); border-radius: 20px; }
    .allergen-tag.active { border-color: var(--red); color: var(--red); background: rgba(193,18,31,0.05); }
    .tracker-btn { position: fixed; bottom: 2rem; right: var(--pad-x); z-index: 900; background: var(--red); color: white; padding: 1rem 2rem; border-radius: 40px; font-family: var(--f-display); font-size: 1.1rem; display: flex; align-items: center; gap: 1rem; box-shadow: 0 10px 30px rgba(193,18,31,0.3); cursor: none; opacity: 0; pointer-events: none; transform: translateY(20px); transition: all 0.4s var(--ease-expo); }
    .tracker-btn.visible { opacity: 1; pointer-events: all; transform: translateY(0); }
    .tracker-btn:hover { background: #E5383B; transform: translateY(-5px); }
    .tracker-btn span { font-family: var(--f-sans); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; border-left: 1px solid rgba(255,255,255,0.3); padding-left: 1rem; }
    .cart-overlay { position: fixed; inset: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(5px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .cart-overlay.active { opacity: 1; pointer-events: all; }
    .cart-drawer { position: fixed; top: 0; right: 0; width: 100%; max-width: 400px; height: 100svh; background: var(--surface); border-left: 1px solid var(--red); z-index: 1001; transform: translateX(100%); transition: transform 0.6s var(--ease-expo); display: flex; flex-direction: column; }
    .cart-drawer.active { transform: translateX(0); }
    .cart-hd { padding: 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .cart-hd h2 { font-family: var(--f-display); font-size: 1.5rem; }
    .cart-close { font-size: 1.5rem; color: var(--ash); cursor: none; transition: color 0.3s; }
    .cart-close:hover { color: var(--red); }
    .cart-items { flex: 1; overflow-y: auto; padding: 2rem; }
    .c-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px dashed var(--border); }
    .c-item__info { flex: 1; }
    .c-item__name { font-family: var(--f-serif); font-size: 1.1rem; color: var(--cream); margin-bottom: 0.2rem; }
    .c-item__price { font-family: var(--f-sans); font-size: 0.7rem; color: var(--ash-dim); }
    .c-item__actions { display: flex; align-items: center; gap: 0.8rem; }
    .c-item__qty { font-family: var(--f-display); font-size: 1rem; width: 20px; text-align: center; }
    .c-btn { width: 24px; height: 24px; border: 1px solid var(--border-hi); border-radius: 50%; color: var(--cream); display: flex; align-items: center; justify-content: center; cursor: none; transition: border-color 0.3s, color 0.3s; }
    .c-btn:hover { border-color: var(--red); color: var(--red); }
    .cart-ft { padding: 2rem; border-top: 1px solid var(--border); background: var(--surface-hi); }
    .cart-total-line { display: flex; justify-content: space-between; font-family: var(--f-display); font-size: 1.8rem; margin-bottom: 0.5rem; }
    .cart-note { font-family: var(--f-sans); font-size: 0.6rem; color: var(--ash); font-style: italic; text-align: center; opacity: 0.7; }
    @media(max-width: 768px) {
      .dish__expanded { grid-template-columns: 1fr; gap: 1.5rem; }
      .dish__header { flex-wrap: wrap; gap: 1rem; }
      .dish__actions { width: 100%; justify-content: space-between; padding-top: 1rem; border-top: 1px solid var(--border); }
      .cart-drawer { max-width: 100%; border-left: none; }
    }
  </style>
</head>

<div id="cur-dot"></div>

<header class="nav">

<div class="menu-bar" id="menu-bar">

<script>
/* ═══════════════════════════════════════

═══════════════════════════════════════ */

};

const catDict = {

  'Sashimi':           { es:'Sashimi',           ca:'Sashimi',         en:'Sashimi',          fr:'Sashimi' },

  'Uramaki':           { es:'Uramaki',            ca:'Uramaki',         en:'Inside-out Rolls', fr:'Uramaki' },
  'Platos Calientes':  { es:'Platos Calientes',   ca:'Plats Calents',   en:'Hot Dishes',       fr:'Plats Chauds' },
  'Postres':           { es:'Postres',            ca:'Postres',         en:'Desserts',         fr:'Desserts' }
};

const ALLERGENS_DICT = [
  {key:"Gluten",      es:"Gluten",       ca:"Gluten",      en:"Gluten",       fr:"Gluten"},
  {key:"Altramuces",  es:"Altramuces",   ca:"Tramussos",   en:"Lupin",        fr:"Lupin"},
  {key:"Apio",        es:"Apio",         ca:"Api",         en:"Celery",       fr:"Céleri"},
  {key:"Cacahuetes",  es:"Cacahuetes",   ca:"Cacauets",    en:"Peanuts",      fr:"Arachides"},
  {key:"Crustáceos",  es:"Crustáceos",   ca:"Crustacis",   en:"Crustaceans",  fr:"Crustacés"},
  {key:"Frutos secos",es:"Frutos secos", ca:"Fruits secs", en:"Tree nuts",    fr:"Fruits à coque"},
  {key:"Sésamo",      es:"Sésamo",       ca:"Sèsam",       en:"Sesame",       fr:"Sésame"},
  {key:"Huevos",      es:"Huevos",       ca:"Ous",         en:"Eggs",         fr:"Œufs"},
  {key:"Lácteos",     es:"Lácteos",      ca:"Lactis",      en:"Dairy",        fr:"Lait"},
  {key:"Moluscos",    es:"Moluscos",     ca:"Mol·luscs",   en:"Molluscs",     fr:"Mollusques"},
  {key:"Mostaza",     es:"Mostaza",      ca:"Mostassa",    en:"Mustard",      fr:"Moutarde"},
  {key:"Pescado",     es:"Pescado",      ca:"Peix",        en:"Fish",         fr:"Poisson"},
  {key:"Soja",        es:"Soja",         ca:"Soja",        en:"Soy",          fr:"Soja"},
  {key:"Sulfitos",    es:"Sulfitos",     ca:"Sulfits",     en:"Sulphites",    fr:"Sulfites"}
];

function t(key) { return i18nUI[currentLang][key] || key; }

/* ═══════════════════════════════════════
   CARGA DE DATOS DESDE JSON
═══════════════════════════════════════ */
let menuData = [];

async function loadMenuData() {
  const promises = PLATOS_FILES.map(id =>
    fetch(`data/platos/${id}.json`)
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
  );
  const results = await Promise.all(promises);
  menuData = results.filter(Boolean);

  // Orden canónico de categorías
  const catOrder = ['Entrantes','Sashimi','Nigiris Clásicos','Nigiris Flambeados','Makis','Uramaki','Platos Calientes','Postres'];
  menuData.sort((a, b) => {
    const ia = catOrder.indexOf(a.cat), ib = catOrder.indexOf(b.cat);
    if (ia !== ib) return ia - ib;
    return PLATOS_FILES.indexOf(a.id) - PLATOS_FILES.indexOf(b.id);
  });
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function updateStaticTexts() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18nUI[currentLang] && i18nUI[currentLang][key]) el.innerHTML = i18nUI[currentLang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

function renderFilters() {
  const filterList = document.getElementById('filter-list');
  filterList.innerHTML = '';
  ALLERGENS_DICT.forEach(algObj => {
    const btn = document.createElement('button');
    btn.className = 'f-btn' + (activeFilters.includes(algObj.key) ? ' active' : '');
    btn.setAttribute('data-hover','');
    btn.innerHTML = `<span>${algObj[currentLang]}</span>${activeFilters.includes(algObj.key) ? '<span style="font-size:0.5rem;color:var(--red)">✕</span>' : ''}`;
    btn.addEventListener('click', () => {
      if (activeFilters.includes(algObj.key)) activeFilters = activeFilters.filter(a => a !== algObj.key);
      else activeFilters.push(algObj.key);
      document.getElementById('filter-dot').classList.toggle('active', activeFilters.length > 0);
      renderFilters();
      applyFilters();
    });
    filterList.appendChild(btn);
  });
}

function renderMenu() {
  const navEl = document.getElementById('cat-nav');
  const menuEl = document.getElementById('menu-container');
  navEl.innerHTML = '';
  menuEl.innerHTML = '';

  const categories = [...new Set(menuData.map(i => i.cat))];

  categories.forEach((catKey, idx) => {
    const localName = catDict[catKey] ? catDict[catKey][currentLang] : catKey;

    const a = document.createElement('a');
    a.href = `#cat-${idx}`;
    a.textContent = localName;
    a.setAttribute('data-hover','');
    if (idx === 0) a.classList.add('active');
    navEl.appendChild(a);

    const section = document.createElement('section');
    section.className = 'category-section';
    section.id = `cat-${idx}`;

    const title = document.createElement('h2');
    title.className = 'category-title';
    title.textContent = localName;
    section.appendChild(title);

    menuData.filter(i => i.cat === catKey).forEach(item => {
      const article = document.createElement('article');
      article.className = 'dish' + (expandedItems.has(item.id) ? ' is-expanded' : '');
      article.id = `dish-${item.id}`;
      article.dataset.allergens = (item.alg || []).join(',');

      const locName = (item.name && item.name[currentLang]) || item.name?.es || '';
      const locDesc = (item.desc && item.desc[currentLang]) || item.desc?.es || '';

      const ingHTML = (item.ing || []).map(i => `
        <div class="ing-item">
          <span class="${i.sauce ? 'ing-sauce' : ''}">${(i.n && (i.n[currentLang] || i.n.es)) || ''}</span>
          <span>${i.q}</span>
        </div>`).join('');

      const algHTML = ALLERGENS_DICT.map(algObj =>
        (item.alg || []).includes(algObj.key)
          ? `<span class="allergen-tag active">${algObj[currentLang]}</span>`
          : ''
      ).join('');

      const mac = item.mac || {kc:0,pr:0,cb:0,ft:0};

      article.innerHTML = `
        <div class="dish__header" onclick="toggleAccordion('${item.id}')" data-hover>
          <div class="dish__info">
            <h3 class="dish__name">${locName}</h3>
            <p class="dish__desc">${locDesc}</p>
          </div>
          <div class="dish__actions">
            <span class="dish__price">${item.price}</span>
            <button class="dish__add ${cart.find(c=>c.id===item.id)?'in-cart':''}" onclick="event.stopPropagation();addToCart('${item.id}')" data-hover>+</button>
          </div>
        </div>
        <div class="dish__content-wrapper" id="content-${item.id}" style="${expandedItems.has(item.id)?'height:auto':''}">
          <div class="dish__expanded">
            <div class="dish__img-wrap">
              <img src="${item.img}" alt="${locName}" loading="lazy">
            </div>
            <div class="dish__specs">
              <div class="d-section">
                <h3 class="d-section__title">${t('techComp')}</h3>
                <div class="ing-list">${ingHTML}</div>
              </div>
              <div class="d-section">
                <h3 class="d-section__title">${t('nutriProfile')}</h3>
                <div class="macros-grid">
                  <div class="macro-box"><div class="macro-val">${mac.kc}</div><div class="macro-lbl">${t('kcal')}</div></div>
                  <div class="macro-box"><div class="macro-val">${mac.pr}<span class="unit">g</span></div><div class="macro-lbl">${t('prot')}</div></div>
                  <div class="macro-box"><div class="macro-val">${mac.cb}<span class="unit">g</span></div><div class="macro-lbl">${t('carb')}</div></div>
                  <div class="macro-box"><div class="macro-val">${mac.ft}<span class="unit">g</span></div><div class="macro-lbl">${t('fat')}</div></div>
                </div>
              </div>
              <div class="d-section">
                <h3 class="d-section__title">${t('allergensL')}</h3>
                <div class="allergens-list">${algHTML || '<span style="color:var(--ash-dim);font-size:0.85rem;font-style:italic">Sin alérgenos</span>'}</div>
              </div>
            </div>
          </div>
        </div>`;
      section.appendChild(article);
    });

    menuEl.appendChild(section);
  });

  applyFilters();
  bindCursorEvents();
  setTimeout(() => ScrollTrigger.refresh(), 100);
}

/* ═══════════════════════════════════════
   ACORDEÓN
═══════════════════════════════════════ */
let expandedItems = new Set();

window.toggleAccordion = function(id) {
  const dishEl = document.getElementById(`dish-${id}`);
  const content = document.getElementById(`content-${id}`);
  const isExpanded = dishEl.classList.contains('is-expanded');
  if (isExpanded) {
    dishEl.classList.remove('is-expanded');
    expandedItems.delete(id);
    gsap.to(content, { height: 0, duration: 0.4, ease: 'expo.inOut' });
  } else {
    dishEl.classList.add('is-expanded');
    expandedItems.add(id);
    gsap.set(content, { height: 'auto' });
    const h = content.offsetHeight;
    gsap.fromTo(content, { height: 0 }, { height: h, duration: 0.5, ease: 'expo.out' });
  }
};

/* ═══════════════════════════════════════
   CARRITO
═══════════════════════════════════════ */
let cart = [];

function parsePrice(str) { return parseFloat((str || '0').replace('€','').replace(',','.')); }
function formatPrice(num) { return num.toFixed(2).replace('.',',') + '€'; }

window.addToCart = function(id) {
  const item = menuData.find(i => i.id === id);
  if (!item) return;
  const existing = cart.find(i => i.id === id);
  if (existing) existing.qty++;
  else cart.push({ id, basePrice: parsePrice(item.price), qty: 1 });
  const btn = document.querySelector(`#dish-${id} .dish__add`);
  if (btn) gsap.fromTo(btn, { scale: 0.7 }, { scale: 1, duration: 0.5, ease: "elastic.out(1, 0.4)" });
  updateCartUI();
};

window.changeQty = function(id, delta) {
  const idx = cart.findIndex(i => i.id === id);
  if (idx === -1) return;
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
};

function updateCartUI() {
  let total = 0, html = '';
  document.querySelectorAll('.dish__add').forEach(b => b.classList.remove('in-cart'));
  cart.forEach(item => {
    const db = menuData.find(i => i.id === item.id);
    if (!db) return;
    total += item.basePrice * item.qty;
    html += `<div class="c-item">
      <div class="c-item__info">
        <div class="c-item__name">${db.name[currentLang] || db.name.es}</div>
        <div class="c-item__price">${formatPrice(item.basePrice)} ${t('unit')}</div>
      </div>
      <div class="c-item__actions">
        <button class="c-btn" onclick="changeQty('${item.id}',-1)" data-hover>-</button>
        <div class="c-item__qty">${item.qty}</div>
        <button class="c-btn" onclick="changeQty('${item.id}',1)" data-hover>+</button>
      </div>
    </div>`;
    const btn = document.querySelector(`#dish-${item.id} .dish__add`);
    if (btn) btn.classList.add('in-cart');
  });
  document.getElementById('cart-items').innerHTML = html;
  document.getElementById('tracker-total').textContent = formatPrice(total);
  document.getElementById('cart-total-display').textContent = formatPrice(total);
  const trackerBtn = document.getElementById('tracker-btn');
  if (cart.length > 0) trackerBtn.classList.add('visible');
  else { trackerBtn.classList.remove('visible'); closeCartDrawer(); }
  bindCursorEvents();
}

const cOverlay = document.getElementById('cart-overlay');
const cDrawer = document.getElementById('cart-drawer');
document.getElementById('tracker-btn').addEventListener('click', () => { cOverlay.classList.add('active'); cDrawer.classList.add('active'); });
function closeCartDrawer() { cOverlay.classList.remove('active'); cDrawer.classList.remove('active'); }
cOverlay.addEventListener('click', () => { closeCartDrawer(); closeFilterDrawer(); });
document.getElementById('cart-close').addEventListener('click', closeCartDrawer);

/* ═══════════════════════════════════════
   FILTROS ALÉRGENOS
═══════════════════════════════════════ */
let activeFilters = [];
const filterDrawer = document.getElementById('filter-drawer');
document.getElementById('filter-open-btn').addEventListener('click', () => { cOverlay.classList.add('active'); filterDrawer.classList.add('active'); });
window.closeFilterDrawer = () => { cOverlay.classList.remove('active'); filterDrawer.classList.remove('active'); };
document.getElementById('filter-close').addEventListener('click', closeFilterDrawer);

window.applyFilters = function() {
  document.querySelectorAll('.dish').forEach(dish => {
    const algs = dish.dataset.allergens ? dish.dataset.allergens.split(',') : [];
    dish.classList.toggle('hidden', activeFilters.some(f => algs.includes(f)));
  });
  document.querySelectorAll('.category-section').forEach(section => {
    const dishes = section.querySelectorAll('.dish');
    const hidden = section.querySelectorAll('.dish.hidden');
    const navLink = document.querySelector(`.cat-nav a[href="#${section.id}"]`);
    const allHidden = dishes.length > 0 && dishes.length === hidden.length;
    section.style.display = allHidden ? 'none' : 'block';
    if (navLink) navLink.style.display = allHidden ? 'none' : 'inline-block';
  });
  ScrollTrigger.refresh();
};

/* ═══════════════════════════════════════
   CURSOR
═══════════════════════════════════════ */
const dot = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
gsap.ticker.add(() => {
  gsap.set(dot, { x: mx, y: my });
  rx += (mx - rx) * 0.13; ry += (my - ry) * 0.13;
  gsap.set(ring, { x: rx, y: ry });
});
function bindCursorEvents() {
  document.querySelectorAll('a, button, [data-hover], .dish__header').forEach(el => {
    el.onmouseenter = () => ring.classList.add('is-hover');
    el.onmouseleave = () => ring.classList.remove('is-hover');
  });
}

/* ═══════════════════════════════════════
   SCROLLSPY
═══════════════════════════════════════ */
window.addEventListener('scroll', () => {
  let current = '';
  document.querySelectorAll('.category-section').forEach(s => {
    if (s.style.display !== 'none' && pageYOffset >= s.offsetTop - 150) current = s.id;
  });
  document.querySelectorAll('.cat-nav a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === `#${current}`);
  });
});

/* ═══════════════════════════════════════
   CAMBIO DE IDIOMA
═══════════════════════════════════════ */
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const lang = e.target.dataset.lang;
    if (currentLang === lang) return;
    currentLang = lang;
    localStorage.setItem('kuroLang', currentLang);
    updateStaticTexts();
    renderFilters();
    renderMenu();
    updateCartUI();
  });
});

/* ═══════════════════════════════════════
   INICIO: carga JSONs y renderiza
═══════════════════════════════════════ */
(async () => {
  updateStaticTexts();
  await loadMenuData();
  renderFilters();
  renderMenu();
  if (window.location.hash) {
    setTimeout(() => {
      const target = document.querySelector(window.location.hash);
      if (target) window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
    }, 500);
  }
})();
</script>
</body>
</html>
